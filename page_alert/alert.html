<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alèt | WOUTLIB PRO</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FFD700;
            --danger: #FF3B30;
            --success: #25D366;
            --info: #007AFF;
            --bg: #0A0A0A;
            --card-bg: rgba(25, 25, 25, 0.9);
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            padding-bottom: 100px;
        }

        /* --- LIGHTBOX --- */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center;
            z-index: 9999;
        }
        #lightbox img { max-width: 90%; border-radius: 10px; }

        /* --- HEADER & FILTERS --- */
        .header { padding: 30px 20px 10px; }
        .logo-box { background: var(--primary); color: black; font-family: 'Syncopate', sans-serif; font-size: 9px; font-weight: bold; padding: 6px 10px; border-radius: 8px; display: inline-block; margin-bottom: 10px; }
        h1 { margin: 0; font-size: 22px; }
        
        .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 15px 20px; scrollbar-width: none; }
        .filter-scroll::-webkit-scrollbar { display: none; }
        .chip { background: var(--glass); border: 1px solid var(--border); padding: 6px 15px; border-radius: 20px; white-space: nowrap; font-size: 12px; cursor: pointer; }
        .chip.active { background: var(--primary); color: black; }

        /* --- ALERT CARDS (COMPACT) --- */
        .alert-container { padding: 0 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .alert-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex; /* Layout orizontal */
            height: 100px; /* Wotè fiks pou yo tout menm gwosè */
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
        }

        .alert-img-box {
            width: 100px; /* Kare */
            height: 100%;
            background-size: cover;
            background-position: center;
            cursor: zoom-in;
            flex-shrink: 0; /* Anpeche foto a kraze */
        }

        .alert-content {
            flex: 1;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 3px solid transparent;
        }

        /* Koulè bò yo */
        .alert-card.sekirite .alert-content { border-left-color: var(--danger); }
        .alert-card.gaz .alert-content { border-left-color: var(--primary); }
        .alert-card.trafik .alert-content { border-left-color: var(--success); }
        .alert-card.kontrol .alert-content { border-left-color: var(--info); }

        .alert-info h3 { margin: 0 0 4px; font-size: 14px; font-weight: 700; color: #fff; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .alert-info p { margin: 0; font-size: 12px; opacity: 0.7; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.3; }
        
        .alert-meta { margin-top: 6px; font-size: 10px; opacity: 0.4; display: flex; justify-content: space-between; }

        /* --- NAV --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.95); height: 75px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); }
        .nav-item { color: #666; font-size: 10px; text-decoration: none; text-align: center; }
        .nav-item.active { color: var(--primary); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="lightbox" onclick="this.style.display='none'"><img src="" id="lightbox-img"></div>

    <div class="header">
        <div class="logo-box">WOUTLIB</div>
        <h1>Alèt yo</h1>
    </div>

    <div class="filter-scroll">
        <div class="chip active" data-filter="all">Tout</div>
        <div class="chip" data-filter="gaz">⛽ Gaz</div>
        <div class="chip" data-filter="trafik">🚗 Trafik</div>
        <div class="chip" data-filter="sekirite">⚠️ Sekirite</div>
        <div class="chip" data-filter="kontrol">👮 Kontwòl</div>
    </div>

    <div class="alert-container" id="alertList">
        <div class="alert-card gaz">
            <div class="alert-img-box" style="background-image: url('https://images.unsplash.com/photo-1527018601619-a508a2be00cd?w=300');" onclick="zoomImg(this)"></div>
            <div class="alert-content">
                <div class="alert-info">
                    <h3>National - Dèlma 32</h3>
                    <p>Gaz disponib kounye a, liy lan pa twò long.</p>
                </div>
                <div class="alert-meta">
                    <span>5 min de sa</span>
                    <span>⛽ GAZ</span>
                </div>
            </div>
        </div>

        <div class="alert-card sekirite">
            <div class="alert-img-box" style="background-image: url('https://images.unsplash.com/photo-1517483000871-1dbf64a6e1c6?w=300');" onclick="zoomImg(this)"></div>
            <div class="alert-content">
                <div class="alert-info">
                    <h3>Kawotchou ap boule</h3>
                    <p>Zòn anba lavil la konplike, evite pase bò la.</p>
                </div>
                <div class="alert-meta">
                    <span>12 min de sa</span>
                    <span>⚠️ SEKIRITE</span>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item"><span>Kat</span></a>
        <a href="#" class="nav-item active"><span>Alèt</span></a>
        <a href="#" class="nav-item"><span>Gaz</span></a>
        <a href="#" class="nav-item"><span>Menu</span></a>
    </nav>

    <script>
        function zoomImg(el) {
            const url = el.style.backgroundImage.slice(5, -2);
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox').style.display = 'flex';
        }

        const chips = document.querySelectorAll('.chip');
        chips.forEach(chip => {
            chip.addEventListener('click', function() {
                chips.forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                const filter = this.getAttribute('data-filter');
                document.querySelectorAll('.alert-card').forEach(card => {
                    card.style.display = (filter === 'all' || card.classList.contains(filter)) ? 'flex' : 'none';
                });
            });
        });
    </script>


<!-- Modale pou ajoute alert -->
</body>
</html>
